name: Test diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: List test files
        id: list
        shell: bash
        run: |
          files=$(find tests -type f -name '*.test.ts' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$files" >> "$GITHUB_OUTPUT"

  test-file:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover.outputs.matrix) }}
    name: test ${{ matrix.file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run test file
        run: pnpm exec vitest run "${{ matrix.file }}"
