name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install deterministic Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Static checks
        run: pnpm lint

      - name: Scan tracked files for secrets
        run: pnpm scan:secrets

      - name: Audit production dependencies
        if: runner.os == 'Linux'
        run: pnpm audit:dependencies

      - name: Verify dependency graph
        run: pnpm verify:graph

      - name: Clean project-reference build
        run: pnpm build

      - name: Verify native Node imports
        run: pnpm verify:packages

      - name: Verify package archives
        run: pnpm verify:pack

      - name: Test full suite without real Seller writes
        run: pnpm test:fast

      - name: Coverage report and critical-module thresholds
        if: runner.os == 'Linux'
        run: pnpm test:coverage

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/

      - name: Check build pollution
        shell: bash
        run: test -z "$(git status --porcelain)"
